<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク編集</title>
    <style>
        body { font-family: sans-serif; padding: 40px 20px; background-color: #fff; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: left; color: #000; font-size: 28px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], textarea, input[type="date"] { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; 
            box-sizing: border-box; font-size: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-container { margin-top: 30px; display: flex; gap: 12px; }
        .btn { background: #4a90e2; color: white; border: none; padding: 12px 24px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; }
        .btn-cancel { background: #7e8c8d; color: white; text-decoration: none; padding: 12px 24px; border-radius: 4px; display: inline-block; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>タスク編集</h1>
        
        <form th:action="@{/tasks/update}" th:object="${task}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>タイトル</label>
                <input type="text" th:field="*{title}">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: red;"></p>
            </div>

            <div class="form-group">
                <label>内容</label>
                <textarea th:field="*{content}"></textarea>
                <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color: red;"></p>
            </div>

            <div class="form-group">
                <label>開始日</label>
                <input type="date" th:field="*{startDate}">
            </div>

            <div class="form-group">
                <label>終了日</label>
                <input type="date" th:field="*{endDate}">
            </div>

            <div class="btn-container">
                <button type="submit" class="btn">更新</button>
                <a href="/tasks" class="btn-cancel">← キャンセル</a>
            </div>
        </form>
    </div>

</body>
</html>
