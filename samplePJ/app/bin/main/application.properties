spring.thymeleaf.mode=HTML

# Postgres接続先設定（★P0-04：環境変数から安全に読み込む形に変更！）
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/todo_app}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ログレベル
logging.level.sample.*=DEBUG

# MyBatis設定
mybatis.type-aliases-package=sample.common.dao.entity
mybatis.mapper-locations=classpath:sample/common/dao/mapper/*.xml

# セッション有効期限設定
server.servlet.session.timeout=1d