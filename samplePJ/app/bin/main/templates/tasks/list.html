<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク一覧</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #333; }

        /* --- テーブルを横スクロール可能にする魔法の箱 --- */
        .table-container {
            width: 100%;
            overflow-x: auto;      /* 横方向にはみ出したらスクロールバーを出す */
            -webkit-overflow-scrolling: touch; /* iOSでのスクロールを滑らかにする */
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; /* ★ここが重要：これより狭くなるとスクロールが発生する */ }
        
        th { background: #222; color: #fff; padding: 12px; text-align: left; white-space: nowrap; }
        td { border-bottom: 1px solid #ddd; padding: 12px; white-space: nowrap; /* 文字の折り返しを防いで見やすくする */ }
        tr:hover { background-color: #f9f9f9; }
        
        /* 操作ボタンのコンテナ */
        .action-btns { display: flex; gap: 5px; }
        
        .btn-blue { background: #007bff; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 14px; }
        .btn-red { background: #dc3545; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 14px; }
        
        /* 新規作成ボタン */
        .btn-new { 
            background: #28a745; 
            color: white; 
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 4px; 
            display: block;
            width: fit-content;
            margin-left: auto;
            margin-top: 10px; 
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* ページネーション */
        .pagination-container { text-align: center; margin-top: 20px; margin-bottom: 40px; }
        .pagination { display: inline-flex; padding: 0; margin: 0; list-style: none; flex-wrap: wrap; justify-content: center; }
        .pagination a, .disabled { 
            color: #333; 
            padding: 10px 15px; 
            text-decoration: none; 
            border: 1px solid #ddd; 
            background-color: #fff; 
            margin: 2px; 
            border-radius: 4px;
        }
        .pagination a.active { background-color: #007bff; color: white; border: 1px solid #007bff; }
        .disabled { color: #ccc; background-color: #f9f9f9; }

        /* メッセージボックス（スマホでは幅を広げる） */
        .empty-message {
            background-color: #e3f2fd; 
            color: #0d47a1; 
            padding: 20px;
            border-radius: 8px; 
            text-align: center; 
            border: 1px solid #bbdefb; 
            width: 80%;         /* PCでは少し余裕を持たせる */
            max-width: 600px;
            margin: 20px auto;
        }

        /* --- スマホ向け微調整 --- */
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.5rem; }
            .empty-message { width: 95%; padding: 15px; }
            .btn-new { width: 100%; text-align: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <h1>タスク一覧</h1>

    <div class="table-container" th:if="${not #lists.isEmpty(tasks)}">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>タイトル</th>
                    <th>内容</th>
                    <th>登録者</th>
                    <th>開始日</th>
                    <th>終了日</th>
                    <th>作成日時</th>
                    <th>更新日時</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.id}">105</td>
                    <td th:text="${task.title}">タイトル</td>
                    <td th:text="${task.content}">内容</td>
                    <td th:text="${task.name}">登録者名</td>
                    <td th:text="${task.startDate}">2025-07-10</td>
                    <td th:text="${task.endDate}">2025-07-11</td>
                    <td th:text="${task.createdAt}">2025-07-11 00:12</td>
                    <td th:text="${task.updatedAt}">2025-07-11 00:12</td>
					<td>
					    <div class="action-btns">
					        <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn-blue">編集</a>
					        
					        <form th:action="@{/tasks/delete}" method="post" style="display: inline;">
					            <input type="hidden" name="id" th:value="${task.id}" />
					            
					            <button type="submit" class="btn-red" style="border: none; cursor: pointer;"
					                    onclick="return confirm('このタスクを削除してもよろしいですか？');">削除</button>
					        </form>
					    </div>
					</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(tasks)}" class="empty-message">
        <p>📭 現在タスクは登録されていません。「新規作成」から追加してください。</p>
    </div>

    <div class="pagination-container" th:if="${totalPages > 1}">
        <ul class="pagination">
            <li>
                <a th:if="${currentPage > 1}" th:href="@{/tasks(page=${currentPage - 1})}">前</a>
                <span th:unless="${currentPage > 1}" class="disabled">前</span>
            </li>
            <li th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a th:href="@{/tasks(page=${i})}" th:text="${i}" th:classappend="${i == currentPage} ? 'active'">1</a>
            </li>
            <li>
                <a th:if="${currentPage < totalPages}" th:href="@{/tasks(page=${currentPage + 1})}">次</a>
                <span th:unless="${currentPage < totalPages}" class="disabled">次</span>
            </li>
        </ul>
    </div>

	<div style="text-align: right; margin-top: 20px;">
	    <form th:action="@{/logout}" method="post" style="display: inline;">
	        <button type="submit" class="btn-red" style="padding: 10px 20px; border: none; cursor: pointer;">← ログアウト</button>
	    </form>
	</div>

	    <a href="/tasks/new" class="btn-new">+ 新規作成</a>

	</body>
	</html>
