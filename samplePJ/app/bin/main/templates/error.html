<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>アクセスエラー</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-content-center align-items-center">
        <div class="card p-5 shadow-sm text-center" style="max-width: 500px; width: 100%;">
            <h1 class="text-danger display-4 fw-bold mb-3">403</h1>
            <h3 class="text-secondary mb-4">アクセス権限がありません</h3>
            
            <p class="text-muted mb-4" th:text="${errorMessage}">エラーが発生しました。</p>
            
            <a href="/tasks" class="btn btn-primary w-100">タスク一覧へ戻る</a>
        </div>
    </div>
</body>
</html>
